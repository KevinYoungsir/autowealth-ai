# ============================================================================
# AutoWealth AI - 自动发布 Release 工作流
# ============================================================================
# 触发条件：推送 v* 格式的 tag 时自动触发
# 功能：
#   1. 运行全部测试确保代码质量
#   2. 从 CHANGELOG.md 提取当前版本的更新内容
#   3. 创建 GitHub Release 并附带 Release Notes
#   4. 构建 Python 包（sdist + wheel）并上传到 Release
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0, v2.1.3 等格式的 tag

permissions:
  contents: write      # 创建 Release 和上传资产需要写权限
  actions: read

jobs:
  # ==========================================================================
  # Job 1: 运行测试套件
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          flake8 autowealth/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 autowealth/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Format check with black
        run: |
          black --check autowealth/

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=autowealth --cov-report=xml --tb=short

  # ==========================================================================
  # Job 2: 生成 Release Notes 并创建 Release
  # ==========================================================================
  release:
    name: Create Release
    needs: test  # 测试全部通过后才执行
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以解析 CHANGELOG

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        id: version
        run: |
          # 从 tag 名称中提取版本号（去掉 'v' 前缀）
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG_NAME"

      - name: Generate Release Notes from CHANGELOG
        id: notes
        run: |
          python3 << 'PYEOF'
          import re
          import sys

          # 读取 CHANGELOG.md
          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()

          # 从 GitHub 环境获取版本号
          import os
          version = os.environ.get('VERSION', '')

          # 尝试匹配版本段落: ## [x.x.x] - YYYY-MM-DD
          pattern = rf'## \[{re.escape(version)}\][\s\S]*?(?=## \[|\Z)'
          match = re.search(pattern, content)

          if match:
              notes = match.group(0).strip()
              # 写入文件供后续步骤使用
              with open('release_notes.md', 'w', encoding='utf-8') as f:
                  f.write(notes)
              print(f"Successfully extracted release notes for version {version}")
              print(f"Notes length: {len(notes)} characters")
          else:
              # 如果找不到精确匹配，使用最新的版本段落
              pattern = r'## \[\d+\.\d+\.\d+\][\s\S]*?(?=## \[\d+\.\d+\.\d+\]|\Z)'
              match = re.search(pattern, content)
              if match:
                  notes = match.group(0).strip()
                  with open('release_notes.md', 'w', encoding='utf-8') as f:
                      f.write(notes)
                  print(f"Warning: Exact version {version} not found, using latest release notes")
              else:
                  print(f"Error: Could not extract release notes for version {version}")
                  with open('release_notes.md', 'w', encoding='utf-8') as f:
                      f.write(f"Release {version} - See CHANGELOG.md for details.")
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Display Release Notes
        run: |
          echo "===== Release Notes ====="
          cat release_notes.md
          echo "=========================="

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AutoWealth AI ${{ steps.version.outputs.tag }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Job 3: 构建 Python 包并上传
  # ==========================================================================
  build:
    name: Build & Upload Package
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python package (sdist + wheel)
        run: |
          python -m build
          echo "===== Built packages ====="
          ls -la dist/
          echo "=========================="

      - name: Validate package
        run: |
          twine check dist/*

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Upload sdist to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload wheel to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI (optional)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        run: |
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
        continue-on-error: true
