*AutoWealth AI is open-source under the MIT License. Built with Python, powered by multi-agent AI.*
"""

          # 写入文章文件
          with open('devto_article.md', 'w', encoding='utf-8') as f:
              f.write(article_body)

          # 同时写入标题供后续步骤使用
          with open('article_meta.env', 'w', encoding='utf-8') as f:
              f.write(f"ARTICLE_TITLE={article_title}\n")

          print(f"Article generated: {len(article_body)} characters")
          print(f"Title: {article_title}")
          PYEOF

      - name: Publish to Dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          # 读取文章元数据
          source article_meta.env

          # 使用 curl 调用 Dev.to API
          # Dev.to API 文档: https://developers.forem.com/api/v1#tag/articles/operation/createArticle

          # 构建请求体（需要转义 JSON 中的特殊字符）
          ARTICLE_TITLE=$(python3 -c "
          import json
          title = '''${ARTICLE_TITLE}'''
          print(json.dumps(title))
          ")

          # 读取文章内容并转义
          ARTICLE_BODY_JSON=$(python3 -c "
          import json
          with open('devto_article.md', 'r', encoding='utf-8') as f:
              content = f.read()
          print(json.dumps(content))
          ")

          # 构建完整 JSON payload
          PAYLOAD=$(python3 -c "
          import json

          with open('devto_article.md', 'r', encoding='utf-8') as f:
              body_markdown = f.read()

          payload = {
              'article': {
                  'title': '''${ARTICLE_TITLE}''',
                  'body_markdown': body_markdown,
                  'published': True,
                  'series': 'AutoWealth AI Releases',
                  'tags': ['python', 'ai', 'machinelearning', 'opensource', 'finance'],
                  'canonical_url': '${{ steps.info.outputs.url }}'
              }
          }
          print(json.dumps(payload))
          ")

          echo "Publishing to Dev.to..."
          echo "Title: ${ARTICLE_TITLE}"

          HTTP_RESPONSE=$(curl -s -w "\\n%{http_code}" -X POST \
              "https://dev.to/api/articles" \
              -H "api-key: ${DEVTO_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

          # 分离响应体和状态码
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 200 ]; then
              ARTICLE_URL=$(echo "$RESPONSE_BODY" | python3 -c "import sys, json; print(json.load(sys.stdin).get('url', 'unknown'))" 2>/dev/null || echo "unknown")
              ARTICLE_ID=$(echo "$RESPONSE_BODY" | python3 -c "import sys, json; print(json.load(sys.stdin).get('id', 'unknown'))" 2>/dev/null || echo "unknown")
              echo "SUCCESS: Article published to Dev.to!"
              echo "  Article ID: ${ARTICLE_ID}"
              echo "  URL: ${ARTICLE_URL}"
          else
              echo "ERROR: Failed to publish to Dev.to (HTTP ${HTTP_CODE})"
              echo "Response: ${RESPONSE_BODY}"
              exit 1
          fi

      - name: Dev.to Summary
        if: always()
        run: |
          echo "===== Dev.to Publish Summary ====="
          echo "Version: ${{ steps.info.outputs.version }}"
          echo "=================================="
