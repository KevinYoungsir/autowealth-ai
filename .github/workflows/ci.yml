name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development and API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api]"
      - name: Run offline research API tests
        run: |
          python -m pytest \
            tests/test_research_run_store.py \
            tests/test_research_api.py \
            tests/test_real_research_pipeline.py \
            -q \
            --basetemp "${{ runner.temp }}/pytest-autowealth" \
            -p no:cacheprovider

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8001
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build research API image
        run: docker build -f Dockerfile.api -t autowealth-api:test .
