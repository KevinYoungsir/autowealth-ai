# Short-window real-data pipeline validation only. This configuration verifies
# provider, cache, point-in-time, portfolio, backtest and artifact integration;
# it is not a 15-year study and is not intended for parameter optimization.
experiment_name: a_share_real_data_smoke_2024_2025
start_date: "2024-01-01"
end_date: "2025-12-31"

# Fixed, actively traded A-share samples used only to exercise the data chain.
# This is not a historical constituent universe and may contain survivorship bias.
candidate_symbols:
  - "600519"
  - "000001"
  - "600036"
  - "600900"
  - "000858"

rebalance_frequency: yearly
initial_capital: 1000000
commission: 0.0003
stamp_tax: 0.0005
slippage: 0.0002

# Keep the baseline price convention. Corporate actions and cash dividends are
# not reconstructed by this short pipeline validation.
price_adjust: none

# Fixed baseline weights; this configuration does not search or optimize them.
factor_weights:
  value: 0.25
  quality: 0.25
  momentum: 0.20
  low_vol: 0.15
  overbought_oversold: 0.15

portfolio_constraints:
  max_position_weight: 0.15
  min_position_weight: 0.01
  max_industry_weight: 1.0
  max_holdings: 5
  min_holdings: 5
  cash_weight_min: 0.0
  cash_weight_max: 0.4
  min_score: 45.0

benchmark_symbols:
  - "000300"

macro_csv_path: configs/macro_data_template.csv
cache_directory: data/real_cache/smoke_2024_2025
output_directory: data/research_runs

# Running this file does not enable DeepSeek, broker connectivity or trade execution.
