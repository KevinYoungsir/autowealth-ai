experiment_name: a_share_15y_baseline
start_date: "2010-01-04"
end_date: "2024-12-31"

# This is an explicit fixed research universe. It is not a historical index
# constituent set and therefore carries survivorship-bias risk.
candidate_symbols:
  - "600519"
  - "000001"
  - "600036"
  - "600900"
  - "000858"
  - "000333"
  - "601318"
  - "601088"
  - "600276"
  - "000651"

rebalance_frequency: yearly
initial_capital: 1000000
commission: 0.0003
stamp_tax: 0.0005
slippage: 0.0002

# Unadjusted prices avoid retrospective adjustment factors. Corporate actions
# and cash dividends are not yet reconstructed and remain a disclosed limit.
price_adjust: none

factor_weights:
  value: 0.25
  quality: 0.25
  momentum: 0.20
  low_vol: 0.15
  overbought_oversold: 0.15

portfolio_constraints:
  max_position_weight: 0.15
  min_position_weight: 0.01
  max_industry_weight: 1.0
  max_holdings: 10
  min_holdings: 5
  cash_weight_min: 0.0
  cash_weight_max: 0.4
  min_score: 45.0

benchmark_symbols:
  - "000300"
  - "000905"

macro_csv_path: configs/macro_data_template.csv
cache_directory: data/real_cache
output_directory: data/research_runs
